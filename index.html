<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neural Portfolio · Salony Ranjan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#03030f;font-family:'DM Mono',monospace}
canvas{display:block;position:fixed;inset:0}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
.corner{position:absolute;width:28px;height:28px;opacity:.5}
.corner.tl{top:18px;left:18px;border-top:1.5px solid #c8ff00;border-left:1.5px solid #c8ff00}
.corner.tr{top:18px;right:18px;border-top:1.5px solid #c8ff00;border-right:1.5px solid #c8ff00}
.corner.bl{bottom:18px;left:18px;border-bottom:1.5px solid #c8ff00;border-left:1.5px solid #c8ff00}
.corner.br{bottom:18px;right:18px;border-bottom:1.5px solid #c8ff00;border-right:1.5px solid #c8ff00}

#brand{position:absolute;top:26px;left:36px}
#brand .sys{font-size:8px;letter-spacing:.5em;color:#c8ff0055;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
#brand .sys::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:#c8ff00;box-shadow:0 0 10px #c8ff00;animation:pulse-dot 2s ease infinite}
#brand .name{font-size:26px;font-weight:800;color:#fff;font-family:'Syne',sans-serif;letter-spacing:-.03em;line-height:1}
#brand .name span{color:#c8ff00}
#brand .sub{font-size:9px;color:#ffffff30;margin-top:6px;letter-spacing:.15em}

#topright{position:absolute;top:26px;right:36px;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
#clock{font-size:10px;color:#ffffff20;letter-spacing:.2em}
#fps-counter{font-size:9px;letter-spacing:.25em;padding:3px 8px;border:1px solid #ffffff10;border-radius:3px}
#node-stats{font-size:9px;color:#ffffff25;letter-spacing:.1em}

/* ── Legend ── */
#legend{position:absolute;bottom:36px;left:36px}
#legend .leg-title{font-size:8px;color:#ffffff20;letter-spacing:.35em;text-transform:uppercase;margin-bottom:12px}
.leg-item{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;pointer-events:all;transition:opacity .2s}
.leg-item:hover{opacity:.7}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-name{font-size:9px;color:#ffffff50;letter-spacing:.1em;text-transform:capitalize}
.leg-count{font-size:8px;color:#ffffff20;margin-left:auto;padding-left:16px}

/* ── Controls ── */
#controls{position:absolute;bottom:36px;right:36px;text-align:right}
#controls .ctrl-title{font-size:8px;color:#ffffff20;letter-spacing:.35em;text-transform:uppercase;margin-bottom:12px}
.ctrl-row{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-bottom:6px}
.ctrl-key{font-size:8px;color:#c8ff0060;border:1px solid #c8ff0020;padding:2px 7px;border-radius:2px;letter-spacing:.08em}
.ctrl-act{font-size:9px;color:#ffffff25}

/* ── Search bar ── */
#searchbar{
  position:absolute;top:26px;left:50%;transform:translateX(-50%);
  pointer-events:all;
  display:flex;align-items:center;gap:0;
  background:rgba(3,3,15,.85);
  border:1px solid #ffffff12;
  border-radius:4px;
  backdrop-filter:blur(20px);
  overflow:hidden;
  transition:border-color .2s;
}
#searchbar:focus-within{border-color:#c8ff0040}
#searchbar .s-icon{padding:0 12px;color:#ffffff25;font-size:11px}
#searchbar input{
  background:transparent;border:none;outline:none;
  font-family:'DM Mono',monospace;font-size:11px;color:#fff;
  padding:9px 14px 9px 0;width:220px;letter-spacing:.05em;
}
#searchbar input::placeholder{color:#ffffff20}
#search-count{font-size:9px;color:#c8ff0050;padding-right:12px;letter-spacing:.1em}

/* ── Tooltip ── */
#tooltip{
  position:fixed;pointer-events:none;z-index:30;
  opacity:0;transform:translateY(6px);
  transition:opacity .18s ease,transform .18s ease;
}
#tooltip.show{opacity:1;transform:translateY(0)}
.tip-box{
  background:rgba(3,3,15,.97);
  border-radius:6px;
  min-width:230px;max-width:290px;
  backdrop-filter:blur(30px);
  overflow:hidden;
}
.tip-header{padding:14px 16px 10px;border-bottom:1px solid #ffffff08}
.tip-cat{font-size:8px;letter-spacing:.35em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tip-cat-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tip-name{font-size:14px;color:#fff;font-weight:700;line-height:1.2;font-family:'Syne',sans-serif}
.tip-body{padding:10px 16px 12px}
.tip-score{font-size:9px;color:#ffffff35;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.tip-score-bar{flex:1;height:2px;background:#ffffff08;border-radius:1px;overflow:hidden}
.tip-score-fill{height:100%;border-radius:1px;transition:width .3s ease}
.tip-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.tip-tag{font-size:8px;padding:3px 7px;border-radius:2px;letter-spacing:.08em}
.tip-actions{display:flex;gap:6px}
.tip-btn{
  flex:1;font-size:9px;padding:6px 10px;border-radius:3px;letter-spacing:.08em;
  display:flex;align-items:center;justify-content:center;gap:5px;
  font-family:'DM Mono',monospace;cursor:pointer;pointer-events:all;
  transition:opacity .15s;border:none;
}
.tip-btn:hover{opacity:.8}
.tip-btn.github{background:#ffffff10;color:#ffffff80}
.tip-btn.demo{color:#03030f;font-weight:500}

/* ── Loading overlay ── */
#loader{
  position:fixed;inset:0;z-index:100;background:#03030f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .8s ease;
}
#loader.fade{opacity:0;pointer-events:none}
.load-ring{width:48px;height:48px;border:1.5px solid #ffffff10;border-top:1.5px solid #c8ff00;border-radius:50%;animation:spin .8s linear infinite}
.load-text{font-size:10px;color:#ffffff30;letter-spacing:.3em;text-transform:uppercase}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}

/* ── Mini panel ── */
#mini-panel{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:40;pointer-events:all;
  background:rgba(3,3,15,.98);
  border-radius:8px;
  min-width:320px;max-width:420px;
  display:none;
  backdrop-filter:blur(40px);
  overflow:hidden;
}
#mini-panel.show{display:block;animation:fadeInScale .2s ease}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(.94)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.panel-header{padding:18px 20px 14px;border-bottom:1px solid #ffffff08;display:flex;justify-content:space-between;align-items:flex-start}
.panel-cat-tag{font-size:8px;letter-spacing:.35em;text-transform:uppercase;margin-bottom:8px}
.panel-name{font-size:20px;font-weight:800;color:#fff;font-family:'Syne',sans-serif;line-height:1.1}
.panel-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:#ffffff40;font-size:16px;cursor:pointer;border:1px solid #ffffff10;border-radius:3px;flex-shrink:0;transition:all .15s}
.panel-close:hover{color:#fff;border-color:#ffffff30}
.panel-body{padding:16px 20px 20px}
.panel-complexity{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.panel-complexity-label{font-size:9px;color:#ffffff30;letter-spacing:.1em}
.panel-complexity-val{font-size:11px;letter-spacing:.05em}
.panel-bar{flex:1;height:3px;background:#ffffff08;border-radius:2px;overflow:hidden}
.panel-bar-fill{height:100%;border-radius:2px}
.panel-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.panel-tag{font-size:8px;padding:4px 9px;border-radius:2px;letter-spacing:.08em}
.panel-links{display:flex;flex-direction:column;gap:8px}
.panel-link-btn{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-radius:4px;cursor:pointer;transition:all .15s;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.05em;
  text-decoration:none;
}
.panel-link-btn.github-btn{background:#ffffff06;color:#ffffff60;border:1px solid #ffffff10}
.panel-link-btn.github-btn:hover{background:#ffffff10;color:#fff}
.panel-link-btn.demo-btn{color:#03030f;border:none;font-weight:500}
.panel-link-btn.demo-btn:hover{opacity:.85}
.panel-link-icon{font-size:13px}
.overlay-bg{position:fixed;inset:0;z-index:35;background:rgba(3,3,15,.6);backdrop-filter:blur(2px);display:none}
.overlay-bg.show{display:block}

/* ── Scanlines ── */
#scanline{
  position:fixed;inset:0;pointer-events:none;z-index:5;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.02) 3px,rgba(0,0,0,.02) 4px);
  animation:scanMove 8s linear infinite;
}
@keyframes scanMove{0%{background-position:0 0}100%{background-position:0 4px}}

/* ── Vignette ── */
#vignette{position:fixed;inset:0;pointer-events:none;z-index:4;background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(3,3,15,.7) 100%)}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="scanline"></div>
<div id="vignette"></div>

<!-- Loader -->
<div id="loader">
  <div class="load-ring"></div>
  <div class="load-text">Initialising Neural Graph</div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <div id="brand">
    <div class="sys"><span>SYSTEM ONLINE</span></div>
    <div class="name">Salony<span>.</span></div>
    <div class="sub" id="node-stats">— nodes · force-directed · 3D knowledge graph</div>
  </div>

  <div id="topright">
    <div id="clock"></div>
    <div id="fps-counter">60 FPS</div>
  </div>

  <!-- Search -->
  <div id="searchbar">
    <span class="s-icon">⌕</span>
    <input type="text" id="search-input" placeholder="Search projects…" autocomplete="off" spellcheck="false"/>
    <span id="search-count"></span>
  </div>

  <div id="legend">
    <div class="leg-title">Categories</div>
    <div id="legend-items"></div>
  </div>

  <div id="controls">
    <div class="ctrl-title">Controls</div>
    <div class="ctrl-row"><span class="ctrl-act">Rotate</span><span class="ctrl-key">Drag</span></div>
    <div class="ctrl-row"><span class="ctrl-act">Zoom</span><span class="ctrl-key">Scroll</span></div>
    <div class="ctrl-row"><span class="ctrl-act">Pan</span><span class="ctrl-key">Right drag</span></div>
    <div class="ctrl-row"><span class="ctrl-act">Open project</span><span class="ctrl-key">Click node</span></div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tip-box" id="tip-box">
    <div class="tip-header">
      <div class="tip-cat"><span class="tip-cat-dot" id="tip-dot"></span><span id="tip-cat"></span></div>
      <div class="tip-name" id="tip-name"></div>
    </div>
    <div class="tip-body">
      <div class="tip-score">
        <span id="tip-score-label"></span>
        <div class="tip-score-bar"><div class="tip-score-fill" id="tip-score-fill"></div></div>
      </div>
      <div class="tip-tags" id="tip-tags"></div>
      <div class="tip-actions" id="tip-actions">
        <button class="tip-btn github" id="tip-github-btn">⌥ GitHub</button>
        <button class="tip-btn demo" id="tip-demo-btn">↗ Live Demo</button>
      </div>
    </div>
  </div>
</div>

<!-- Panel overlay -->
<div class="overlay-bg" id="overlay-bg"></div>
<div id="mini-panel">
  <div class="panel-header">
    <div>
      <div class="panel-cat-tag" id="panel-cat"></div>
      <div class="panel-name" id="panel-name"></div>
    </div>
    <div class="panel-close" id="panel-close">✕</div>
  </div>
  <div class="panel-body">
    <div class="panel-complexity">
      <span class="panel-complexity-label">COMPLEXITY</span>
      <span class="panel-complexity-val" id="panel-score"></span>
      <div class="panel-bar"><div class="panel-bar-fill" id="panel-bar-fill"></div></div>
    </div>
    <div class="panel-tags" id="panel-tags"></div>
    <div class="panel-links" id="panel-links"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════════════════════════════
const RAW = [
  {name:"anime-grid",        score:283552.6, gh:"https://github.com/salonyranjan/anime-grid",                       demo:"https://anime-grid-nine.vercel.app/"},
  {name:"BitFlow",           score:30226,    gh:"https://github.com/salonyranjan/BitFlow",                          demo:"https://bit-flow-two.vercel.app/"},
  {name:"CineNative",        score:21319.1,  gh:"https://github.com/salonyranjan/CineNative",                       demo:null},
  {name:"ct-patient-data",   score:277785.7, gh:"https://github.com/salonyranjan/ct-patient-data-dashboard",        demo:"https://ct-patient-data-dashboard.vercel.app/"},
  {name:"ResQplate Frontend",score:116924.5, gh:"https://github.com/salonyranjan/frontend-ResQplate-",              demo:"https://res-q-plate.vercel.app/"},
  {name:"GTA-VI",            score:226218.7, gh:"https://github.com/salonyranjan/GTA-VI",                           demo:"https://gta-vi-woad.vercel.app/"},
  {name:"MediQuery.ai",      score:128056.3, gh:"https://github.com/salonyranjan/MediQuery.ai",                     demo:"https://mediquery-ai.streamlit.app/"},
  {name:"Mocktail",          score:289602.7, gh:"https://github.com/salonyranjan/Mocktail",                         demo:"https://mocktail-seven.vercel.app/"},
  {name:"OpenShelf-E2E",     score:193883,   gh:"https://github.com/salonyranjan/OpenShelf-E2E",                    demo:"https://openshelf-e2e.streamlit.app/"},
  {name:"PageWhisper",       score:76032.9,  gh:"https://github.com/salonyranjan/PageWhisper",                      demo:"https://page-whisper.vercel.app/"},
  {name:"ResQPlate",         score:5088.7,   gh:"https://github.com/salonyranjan/ResQPlate",                        demo:"https://res-q-plate.vercel.app/"},
  {name:"Retail Insights",   score:2385.4,   gh:"https://github.com/salonyranjan/Retail-Customer-Insights-Dashboard--SQL---Python---Power-BI-", demo:null},
  {name:"Rewind",            score:155640.9, gh:"https://github.com/salonyranjan/Rewind",                           demo:"https://rewind-pied.vercel.app/"},
  {name:"RoleRadar",         score:879.7,    gh:"https://github.com/salonyranjan/RoleRadar",                        demo:"https://roleradarz.streamlit.app/"},
  {name:"RxScan-AI",         score:17411.1,  gh:"https://github.com/salonyranjan/RxScan-AI",                        demo:"https://rx-scan-ai.vercel.app/"},
  {name:"Fitness Club",      score:136552.4, gh:"https://github.com/salonyranjan/Salony-s-Fitness-Club",            demo:"https://salony-s-fitness-club.vercel.app/"},
  {name:"salonyranjan",      score:69138.2,  gh:"https://github.com/salonyranjan/salonyranjan",                     demo:null},
  {name:"Portfolio Site",    score:67,       gh:"https://github.com/salonyranjan/salonyranjan.github.io",           demo:"https://salonyranjan.github.io/"},
  {name:"SkillBridge-AI",    score:23903.8,  gh:"https://github.com/salonyranjan/SkillBridge-AI",                   demo:"https://skill-bridge-ai-orpin.vercel.app/"},
  {name:"sonic-prep",        score:129381.1, gh:"https://github.com/salonyranjan/sonic-prep",                       demo:"https://sonic-prep.vercel.app/"},
  {name:"VertexFlow",        score:348743.7, gh:"https://github.com/salonyranjan/VertexFlow",                       demo:"https://vertex-flow-phi.vercel.app/"},
  {name:"Z-Axis-Cloud",      score:475.4,    gh:"https://github.com/salonyranjan/Z-Axis-Cloud",                     demo:"https://z-axis-cloud.vercel.app/"},
  {name:"ZenithRAG",         score:314768.7, gh:"https://github.com/salonyranjan/ZenithRAG",                        demo:null},
];

const CATS = {
  ai:      {color:0xc8ff00, hex:'#c8ff00', r:1.9, tags:['AI','ML','LLM']},
  fullstack:{color:0xff6e3c,hex:'#ff6e3c', r:1.5, tags:['React','Node','API']},
  data:    {color:0x38bdf8, hex:'#38bdf8', r:1.3, tags:['Analytics','SQL','BI']},
  design:  {color:0xf472b6, hex:'#f472b6', r:1.2, tags:['UI','Three.js','WebGL']},
  mobile:  {color:0xa3e635, hex:'#a3e635', r:1.1, tags:['Native','Cross-platform']},
  tool:    {color:0xfbbf24, hex:'#fbbf24', r:1.0, tags:['Utility','Automation']},
};

function classify(name,score){
  const n=name.toLowerCase();
  if(n.includes('rag')||n.includes('mediquery')||n.includes('rxscan')||n.includes('skillbridge')||n.includes('ai')) return 'ai';
  if(n.includes('dashboard')||n.includes('retail')||n.includes('patient')||n.includes('radar')) return 'data';
  if(n.includes('vertex')||n.includes('z-axis')||n.includes('gta')||n.includes('portfolio')||n.includes('salony')) return 'design';
  if(n.includes('native')||n.includes('mobile')) return 'mobile';
  if(n.includes('whisper')||n.includes('rewind')||n.includes('sonic')||n.includes('mocktail')) return 'tool';
  return 'fullstack';
}

const maxScore = Math.max(...RAW.map(d=>d.score));
const NODES = RAW.map((d,i)=>{
  const cat=classify(d.name,d.score);
  const cfg=CATS[cat];
  const nr=cfg.r*(0.65+0.85*(d.score/maxScore));
  return {...d, cat, cfg, nr,
    x:(Math.random()-.5)*80, y:(Math.random()-.5)*80, z:(Math.random()-.5)*80,
    vx:0,vy:0,vz:0, visible:true};
});

// ── Legend
const legEl=document.getElementById('legend-items');
Object.entries(CATS).forEach(([cat,cfg])=>{
  const count=NODES.filter(n=>n.cat===cat).length;
  legEl.innerHTML+=`<div class="leg-item" data-cat="${cat}">
    <div class="leg-dot" style="background:${cfg.hex};box-shadow:0 0 8px ${cfg.hex}80"></div>
    <span class="leg-name">${cat}</span>
    <span class="leg-count">${count}</span>
  </div>`;
});
document.getElementById('node-stats').textContent=`${NODES.length} nodes · ${NODES.filter(n=>n.demo).length} live demos`;

// ── Category filter via legend
let activeFilter=null;
document.querySelectorAll('.leg-item').forEach(el=>{
  el.addEventListener('click',()=>{
    const cat=el.getAttribute('data-cat');
    if(activeFilter===cat){activeFilter=null;el.style.opacity='';document.querySelectorAll('.leg-item').forEach(e=>e.style.opacity='')}
    else{activeFilter=cat;document.querySelectorAll('.leg-item').forEach(e=>e.style.opacity=e.getAttribute('data-cat')===cat?'1':'.25')}
    updateNodeVisibility();
  });
});

function updateNodeVisibility(){
  NODES.forEach(n=>{
    n.visible = !activeFilter || n.cat===activeFilter;
  });
}

// ── Search
const searchInput=document.getElementById('search-input');
const searchCount=document.getElementById('search-count');
let searchQuery='';
searchInput.addEventListener('input',e=>{
  searchQuery=e.target.value.toLowerCase().trim();
  if(searchQuery){
    const matches=NODES.filter(n=>n.name.toLowerCase().includes(searchQuery));
    searchCount.textContent=`${matches.length}`;
    NODES.forEach(n=>n.visible=n.name.toLowerCase().includes(searchQuery));
  } else {
    searchCount.textContent='';
    NODES.forEach(n=>n.visible=!activeFilter||n.cat===activeFilter);
  }
});

// ════════════════════════════════════════════════════════════════════════════════
// FORCE LAYOUT
// ════════════════════════════════════════════════════════════════════════════════
const LINKS=[];
for(let i=0;i<NODES.length;i++)
  for(let j=i+1;j<NODES.length;j++)
    if(NODES[i].cat===NODES[j].cat||Math.random()<0.05) LINKS.push([i,j]);

function runForce(steps){
  for(let s=0;s<steps;s++){
    for(let i=0;i<NODES.length;i++){
      for(let j=i+1;j<NODES.length;j++){
        const dx=NODES[i].x-NODES[j].x,dy=NODES[i].y-NODES[j].y,dz=NODES[i].z-NODES[j].z;
        const d2=dx*dx+dy*dy+dz*dz+.01;
        const f=900/d2;const d=Math.sqrt(d2);
        const mx=dx/d*f,my=dy/d*f,mz=dz/d*f;
        NODES[i].vx+=mx;NODES[i].vy+=my;NODES[i].vz+=mz;
        NODES[j].vx-=mx;NODES[j].vy-=my;NODES[j].vz-=mz;
      }
    }
    for(const [a,b] of LINKS){
      const dx=NODES[b].x-NODES[a].x,dy=NODES[b].y-NODES[a].y,dz=NODES[b].z-NODES[a].z;
      const d=Math.sqrt(dx*dx+dy*dy+dz*dz)+.01;
      const f=(d-28)*.018;
      NODES[a].vx+=dx/d*f;NODES[a].vy+=dy/d*f;NODES[a].vz+=dz/d*f;
      NODES[b].vx-=dx/d*f;NODES[b].vy-=dy/d*f;NODES[b].vz-=dz/d*f;
    }
    for(const n of NODES){
      n.vx-=n.x*.012;n.vy-=n.y*.012;n.vz-=n.z*.012;
      n.vx*=.78;n.vy*=.78;n.vz*=.78;
      n.x+=n.vx;n.y+=n.vy;n.z+=n.vz;
    }
  }
}
runForce(150);

// ════════════════════════════════════════════════════════════════════════════════
// THREE.JS
// ════════════════════════════════════════════════════════════════════════════════
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#03030f');
scene.fog=new THREE.FogExp2('#03030f',.0028);

const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,.1,1000);
camera.position.set(0,0,175);

// Lights
scene.add(new THREE.AmbientLight(0xffffff,1.8));
const pl1=new THREE.PointLight(0xc8ff00,2.5,150);scene.add(pl1);
const pl2=new THREE.PointLight(0xff6e3c,1.2,250);pl2.position.set(60,50,40);scene.add(pl2);
const pl3=new THREE.PointLight(0x38bdf8,1.0,250);pl3.position.set(-50,-40,30);scene.add(pl3);
const pl4=new THREE.PointLight(0xf472b6,.7,200);pl4.position.set(0,-60,-40);scene.add(pl4);

// ── Orbit controls
const orbit={theta:.4,phi:Math.PI/2.1,radius:175,panX:0,panY:0,dragging:false,panning:false,lastX:0,lastY:0,downX:0,downY:0,wasDrag:false,autoRotate:true};

function updateCamera(){
  const x=orbit.radius*Math.sin(orbit.phi)*Math.sin(orbit.theta);
  const y=orbit.radius*Math.cos(orbit.phi);
  const z=orbit.radius*Math.sin(orbit.phi)*Math.cos(orbit.theta);
  camera.position.set(x+orbit.panX,y+orbit.panY,z);
  camera.lookAt(orbit.panX,orbit.panY,0);
}
updateCamera();

canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('pointerdown',e=>{
  orbit.dragging=true;orbit.panning=(e.button===2||e.button===1);
  orbit.lastX=e.clientX;orbit.lastY=e.clientY;orbit.downX=e.clientX;orbit.downY=e.clientY;orbit.wasDrag=false;orbit.autoRotate=false;
});
window.addEventListener('pointermove',e=>{
  if(!orbit.dragging)return;
  const dx=e.clientX-orbit.lastX,dy=e.clientY-orbit.lastY;
  if(orbit.panning){orbit.panX-=dx*orbit.radius*.001;orbit.panY+=dy*orbit.radius*.001;}
  else{orbit.theta-=dx*.005;orbit.phi=Math.max(.12,Math.min(Math.PI-.12,orbit.phi+dy*.005));}
  orbit.lastX=e.clientX;orbit.lastY=e.clientY;
  if(Math.hypot(e.clientX-orbit.downX,e.clientY-orbit.downY)>5)orbit.wasDrag=true;
  updateCamera();
});
window.addEventListener('pointerup',e=>{
  if(!orbit.dragging){orbit.wasDrag=false;return;}
  orbit.dragging=false;
  if(!orbit.wasDrag)handleClick(e);
  orbit.wasDrag=false;
  setTimeout(()=>orbit.autoRotate=true,3000);
});
canvas.addEventListener('wheel',e=>{
  orbit.radius=Math.max(35,Math.min(380,orbit.radius+e.deltaY*.14));
  updateCamera();e.preventDefault();
},{passive:false});
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);
});

// ── Raycaster
const raycaster=new THREE.Raycaster();
const mouse2=new THREE.Vector2();
const meshToNode=new Map();
const hitMeshes=[];

// ── Build meshes
const sphereMeshes=[],glowMeshes=[],nodeMeshGroups=[];

NODES.forEach((node,i)=>{
  const{cfg,nr}=node;

  // Core
  const geo=new THREE.SphereGeometry(nr,36,36);
  const mat=new THREE.MeshStandardMaterial({color:cfg.color,emissive:cfg.color,emissiveIntensity:2.8,roughness:.1,metalness:.9,toneMapped:false});
  const sphere=new THREE.Mesh(geo,mat);scene.add(sphere);sphereMeshes.push(sphere);

  // Inner glow ring
  const rGeo=new THREE.TorusGeometry(nr*1.4,.12,8,32);
  const rMat=new THREE.MeshBasicMaterial({color:cfg.color,transparent:true,opacity:.35,blending:THREE.AdditiveBlending,depthWrite:false});
  const ring=new THREE.Mesh(rGeo,rMat);scene.add(ring);

  // Outer glow
  const gGeo=new THREE.SphereGeometry(nr*2.6,16,16);
  const gMat=new THREE.MeshBasicMaterial({color:cfg.color,transparent:true,opacity:.04,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide});
  const glow=new THREE.Mesh(gGeo,gMat);scene.add(glow);glowMeshes.push(glow);

  // Hit sphere
  const hit=new THREE.Mesh(new THREE.SphereGeometry(nr*3.2,12,12),new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false}));
  scene.add(hit);hitMeshes.push(hit);meshToNode.set(hit.uuid,i);

  nodeMeshGroups.push({sphere,glow,ring,hit,scale:1,targetScale:1,ringPhase:Math.random()*Math.PI*2,ringRot:Math.random()*.5+.3});
});

// ── Edge lines (two layers)
function makeEdgeMesh(opacity,color){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(LINKS.length*6);
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.LineBasicMaterial({color,transparent:true,opacity,blending:THREE.AdditiveBlending,depthWrite:false});
  const mesh=new THREE.LineSegments(geo,mat);scene.add(mesh);
  return{geo,mesh};
}
const edges1=makeEdgeMesh(.05,0xc8ff00);
const edges2=makeEdgeMesh(.025,0x38bdf8);

function updateEdges(){
  const p1=edges1.geo.attributes.position.array;
  const p2=edges2.geo.attributes.position.array;
  for(let i=0;i<LINKS.length;i++){
    const a=NODES[LINKS[i][0]],b=NODES[LINKS[i][1]];
    const av=a.visible&&b.visible?1:0;
    p1[i*6]=a.x;p1[i*6+1]=a.y;p1[i*6+2]=a.z;
    p1[i*6+3]=b.x;p1[i*6+4]=b.y;p1[i*6+5]=b.z;
    p2[i*6]=a.x;p2[i*6+1]=a.y;p2[i*6+2]=a.z+.5;
    p2[i*6+3]=b.x;p2[i*6+4]=b.y;p2[i*6+5]=b.z+.5;
  }
  edges1.geo.attributes.position.needsUpdate=true;
  edges2.geo.attributes.position.needsUpdate=true;
}

// ── Background plexus
const PCOUNT=140;
const pPos=new Float32Array(PCOUNT*3),pVel=new Float32Array(PCOUNT*3);
for(let i=0;i<PCOUNT;i++){pPos[i*3]=(Math.random()-.5)*320;pPos[i*3+1]=(Math.random()-.5)*320;pPos[i*3+2]=(Math.random()-.5)*320;pVel[i*3]=(Math.random()-.5)*.10;pVel[i*3+1]=(Math.random()-.5)*.10;pVel[i*3+2]=(Math.random()-.5)*.10;}
const pGeo=new THREE.BufferGeometry();pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({size:.55,color:0xc8ff00,transparent:true,opacity:.3,depthWrite:false,blending:THREE.AdditiveBlending})));
const plGeo=new THREE.BufferGeometry();
const plMesh=new THREE.LineSegments(plGeo,new THREE.LineBasicMaterial({color:0x4488ff,transparent:true,opacity:.08,depthWrite:false,blending:THREE.AdditiveBlending}));
scene.add(plMesh);

function updatePlexus(){
  for(let i=0;i<PCOUNT;i++){
    pPos[i*3]+=pVel[i*3];pPos[i*3+1]+=pVel[i*3+1];pPos[i*3+2]+=pVel[i*3+2];
    if(Math.abs(pPos[i*3])>160)pVel[i*3]*=-1;
    if(Math.abs(pPos[i*3+1])>160)pVel[i*3+1]*=-1;
    if(Math.abs(pPos[i*3+2])>160)pVel[i*3+2]*=-1;
  }
  pGeo.attributes.position.needsUpdate=true;
  const lp=[];
  for(let i=0;i<PCOUNT;i++)for(let j=i+1;j<PCOUNT;j++){
    const dx=pPos[i*3]-pPos[j*3],dy=pPos[i*3+1]-pPos[j*3+1],dz=pPos[i*3+2]-pPos[j*3+2];
    if(dx*dx+dy*dy+dz*dz<1400)lp.push(pPos[i*3],pPos[i*3+1],pPos[i*3+2],pPos[j*3],pPos[j*3+1],pPos[j*3+2]);
  }
  plGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(lp),3));
}

// ── Sprite labels
function makeLabel(text,color,score){
  const c=document.createElement('canvas');c.width=320;c.height=56;
  const ctx=c.getContext('2d');
  ctx.font='500 14px "DM Mono", monospace';
  ctx.fillStyle=color+'cc';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,160,24);
  if(score){
    ctx.font='300 10px "DM Mono", monospace';
    ctx.fillStyle=color+'55';
    ctx.fillText(Math.round(score/1000)+'k',160,40);
  }
  return new THREE.CanvasTexture(c);
}
const labelSprites=NODES.map(node=>{
  const tex=makeLabel(node.name,node.cfg.hex,node.score);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
  const s=new THREE.Sprite(mat);s.scale.set(20,4,1);scene.add(s);return s;
});

// ════════════════════════════════════════════════════════════════════════════════
// HOVER & CLICK
// ════════════════════════════════════════════════════════════════════════════════
const tooltip=document.getElementById('tooltip');
const tipBox=document.getElementById('tip-box');
const tipCat=document.getElementById('tip-cat');
const tipDot=document.getElementById('tip-dot');
const tipName=document.getElementById('tip-name');
const tipScoreLabel=document.getElementById('tip-score-label');
const tipScoreFill=document.getElementById('tip-score-fill');
const tipTagsEl=document.getElementById('tip-tags');
const tipActions=document.getElementById('tip-actions');
const tipGithubBtn=document.getElementById('tip-github-btn');
const tipDemoBtn=document.getElementById('tip-demo-btn');
let hoveredIdx=-1;

const hRay=new THREE.Raycaster();
const hMouse=new THREE.Vector2();

canvas.addEventListener('mousemove',e=>{
  if(orbit.dragging)return;
  const rect=canvas.getBoundingClientRect();
  hMouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  hMouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  hRay.setFromCamera(hMouse,camera);
  const visHitMeshes=hitMeshes.filter((_,i)=>NODES[i].visible);
  const hits=hRay.intersectObjects(visHitMeshes);
  if(hits.length){
    const actualMesh=hits[0].object;
    // find original index
    let idx=meshToNode.get(actualMesh.uuid);
    if(idx!==undefined){
      if(idx!==hoveredIdx){
        hoveredIdx=idx;
        showTooltip(NODES[idx]);
        document.body.style.cursor='pointer';
      }
      const tx=e.clientX+18,ty=e.clientY-12;
      tooltip.style.left=(tx+290>innerWidth?e.clientX-300:tx)+'px';
      tooltip.style.top=(ty+200>innerHeight?e.clientY-200:ty)+'px';
      tooltip.classList.add('show');
    }
  } else {
    if(hoveredIdx!==-1){hoveredIdx=-1;tooltip.classList.remove('show');document.body.style.cursor='default';}
  }
});
canvas.addEventListener('mouseleave',()=>{hoveredIdx=-1;tooltip.classList.remove('show');document.body.style.cursor='default';});

function showTooltip(node){
  tipCat.textContent=node.cat;
  tipDot.style.background=node.cfg.hex;
  tipDot.style.boxShadow=`0 0 6px ${node.cfg.hex}`;
  tipName.textContent=node.name;
  tipScoreLabel.textContent=`${Math.round(node.score).toLocaleString()} pts`;
  tipScoreFill.style.width=`${(node.score/maxScore)*100}%`;
  tipScoreFill.style.background=node.cfg.hex;
  tipTagsEl.innerHTML=node.cfg.tags.map(t=>`<span class="tip-tag" style="color:${node.cfg.hex}99;border:1px solid ${node.cfg.hex}25;background:${node.cfg.hex}08">${t}</span>`).join('');
  tipBox.style.borderLeft=`2.5px solid ${node.cfg.hex}`;
  tipBox.style.border=`1px solid ${node.cfg.hex}25`;
  tipBox.style.borderLeft=`2.5px solid ${node.cfg.hex}`;
  tipGithubBtn.onclick=(ev)=>{ev.stopPropagation();window.open(node.gh,'_blank','noopener');};
  if(node.demo){
    tipDemoBtn.style.display='flex';
    tipDemoBtn.style.background=node.cfg.hex;
    tipDemoBtn.onclick=(ev)=>{ev.stopPropagation();window.open(node.demo,'_blank','noopener');};
  } else {
    tipDemoBtn.style.display='none';
  }
}

// Click → open panel
function handleClick(e){
  const rect=canvas.getBoundingClientRect();
  mouse2.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse2.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse2,camera);
  const visHitMeshes=hitMeshes.filter((_,i)=>NODES[i].visible);
  const hits=raycaster.intersectObjects(visHitMeshes);
  if(!hits.length)return;
  const idx=meshToNode.get(hits[0].object.uuid);
  if(idx===undefined)return;
  openPanel(NODES[idx]);
}

// Panel
const panel=document.getElementById('mini-panel');
const overlayBg=document.getElementById('overlay-bg');
const panelClose=document.getElementById('panel-close');
const panelCat=document.getElementById('panel-cat');
const panelName=document.getElementById('panel-name');
const panelScore=document.getElementById('panel-score');
const panelBarFill=document.getElementById('panel-bar-fill');
const panelTagsEl=document.getElementById('panel-tags');
const panelLinks=document.getElementById('panel-links');

function openPanel(node){
  panelCat.textContent=node.cat;
  panelCat.style.color=node.cfg.hex;
  panelCat.style.letterSpacing='.35em';
  panelCat.style.fontSize='8px';
  panelName.textContent=node.name;
  panelScore.textContent=Math.round(node.score).toLocaleString();
  panelScore.style.color=node.cfg.hex;
  panelBarFill.style.width=`${(node.score/maxScore)*100}%`;
  panelBarFill.style.background=node.cfg.hex;
  panelTagsEl.innerHTML=node.cfg.tags.map(t=>`<span class="panel-tag" style="color:${node.cfg.hex}99;border:1px solid ${node.cfg.hex}25;background:${node.cfg.hex}08">${t}</span>`).join('');
  panelLinks.innerHTML='';
  // GitHub
  const ghBtn=document.createElement('a');
  ghBtn.className='panel-link-btn github-btn';
  ghBtn.href=node.gh;ghBtn.target='_blank';ghBtn.rel='noopener noreferrer';
  ghBtn.innerHTML=`<span class="panel-link-icon">⌥</span><span>View on GitHub</span><span style="margin-left:auto;font-size:9px;opacity:.4">↗</span>`;
  panelLinks.appendChild(ghBtn);
  // Demo
  if(node.demo){
    const dBtn=document.createElement('a');
    dBtn.className='panel-link-btn demo-btn';
    dBtn.href=node.demo;dBtn.target='_blank';dBtn.rel='noopener noreferrer';
    dBtn.style.background=node.cfg.hex;
    dBtn.innerHTML=`<span class="panel-link-icon">◈</span><span>Open Live Demo</span><span style="margin-left:auto;font-size:9px;opacity:.6">↗</span>`;
    panelLinks.appendChild(dBtn);
  }
  panel.classList.add('show');
  overlayBg.classList.add('show');
  orbit.autoRotate=false;
}
panelClose.addEventListener('click',closePanel);
overlayBg.addEventListener('click',closePanel);
function closePanel(){panel.classList.remove('show');overlayBg.classList.remove('show');setTimeout(()=>orbit.autoRotate=true,2000);}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});

// ════════════════════════════════════════════════════════════════════════════════
// CLOCK & FPS
// ════════════════════════════════════════════════════════════════════════════════
const clockEl=document.getElementById('clock');
const fpsEl=document.getElementById('fps-counter');
setInterval(()=>clockEl.textContent=new Date().toLocaleTimeString('en-US',{hour12:false}),1000);
let frames=0,lastFpsTime=performance.now();

// ════════════════════════════════════════════════════════════════════════════════
// ANIMATION
// ════════════════════════════════════════════════════════════════════════════════
let t=0;
const clock3=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=clock3.getDelta();t+=dt;

  if(orbit.autoRotate&&!orbit.dragging){orbit.theta+=.0025;updateCamera();}

  // Animate lights
  pl1.position.set(Math.sin(t*.4)*50,Math.cos(t*.3)*30,Math.sin(t*.5)*40);
  pl2.position.set(Math.cos(t*.35)*60,Math.sin(t*.25)*50,40);
  pl3.position.set(-50,Math.cos(t*.4)*40,Math.sin(t*.3)*30);

  for(let i=0;i<NODES.length;i++){
    const n=NODES[i];const g=nodeMeshGroups[i];
    const isHov=(i===hoveredIdx);
    const vis=n.visible;

    g.targetScale=isHov?1.5:vis?1:.15;
    g.scale+=(g.targetScale-g.scale)*.1;

    const pos=new THREE.Vector3(n.x,n.y,n.z);
    g.sphere.position.copy(pos);g.glow.position.copy(pos);g.hit.position.copy(pos);g.ring.position.copy(pos);
    g.sphere.scale.setScalar(g.scale);g.glow.scale.setScalar(g.scale);
    g.ring.scale.setScalar(g.scale*(isHov?1.2:1));

    // Ring rotation
    g.ring.rotation.x=t*g.ringRot;g.ring.rotation.y=t*g.ringRot*.7;
    g.ring.material.opacity=vis?(isHov?.6:.25):.0;

    // Emissive pulse
    g.sphere.material.emissiveIntensity=vis?(isHov?5.5:(2.8+Math.sin(t*1.8+g.ringPhase)*.5)):.0;
    g.sphere.material.opacity=vis?1:0;

    // Label
    labelSprites[i].position.set(n.x,n.y+n.nr*g.scale+3,n.z);
    labelSprites[i].material.opacity=vis?(isHov?1:.6):.0;

    // Hit mesh: disable if not visible
    g.hit.visible=vis;
  }

  updateEdges();
  updatePlexus();
  renderer.render(scene,camera);

  frames++;const now=performance.now();
  if(now-lastFpsTime>=1000){
    const fps=Math.round(frames*1000/(now-lastFpsTime));
    fpsEl.textContent=`${fps} FPS`;
    fpsEl.style.color=fps>50?'#c8ff0070':fps>30?'#fbbf2470':'#ff6e3c70';
    frames=0;lastFpsTime=now;
  }
}
animate();

// ── Dismiss loader
window.addEventListener('load',()=>setTimeout(()=>document.getElementById('loader').classList.add('fade'),800));
setTimeout(()=>document.getElementById('loader').classList.add('fade'),1200);
</script>
